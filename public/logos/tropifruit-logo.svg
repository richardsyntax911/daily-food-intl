    <circle cx="16" cy="16" r="14" fill="#F57F17"/>
    <circle cx="16" cy="16" r="11" fill="#FFF176"/>
    <!-- Segments -->
    <line x1="16" y1="5" x2="16" y2="27" stroke="#F57F17" stroke-width="1"/>
    <line x1="5" y1="16" x2="27" y2="16" stroke="#F57F17" stroke-width="1"/>
    <line x1="8" y1="8" x2="24" y2="24" stroke="#F57F17" stroke-width="1"/>
    <line x1="24" y1="8" x2="8" y2="24" stroke="#F57F17" stroke-width="1"/>
